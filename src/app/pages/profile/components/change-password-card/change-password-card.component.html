<div class="card">
  <h2 class="card-title">Alterar senha</h2>
  <p class="card-subtitle">Para sua segurança, utilize uma senha forte e única.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="pw-form">
    <div class="pw-group">
      <label>Senha atual</label>
      <p-password
        formControlName="senhaAtual"
        placeholder="Digite sua senha atual"
        [toggleMask]="true"
        [feedback]="false"
        styleClass="w-full"
        inputStyleClass="w-full"
      />
    </div>

    <div class="pw-group">
      <label>Nova senha</label>
      <p-password
        formControlName="novaSenha"
        placeholder="Digite sua nova senha"
        [toggleMask]="true"
        [feedback]="false"
        styleClass="w-full"
        inputStyleClass="w-full"
      />
    </div>

    <div class="pw-group">
      <label>Confirmar nova senha</label>
      <p-password
        formControlName="confirmarNovaSenha"
        placeholder="Confirme sua nova senha"
        [toggleMask]="true"
        [feedback]="false"
        styleClass="w-full"
        inputStyleClass="w-full"
      />
      @if (form.hasError('passwordMismatch') && form.get('confirmarNovaSenha')?.dirty) {
        <small class="error-msg">As senhas não conferem</small>
      }
    </div>

    <div class="submit-row">
      <p-button
        type="submit"
        label="Atualizar senha"
        icon="pi pi-lock"
        [disabled]="form.invalid || submitting"
        [loading]="submitting"
        styleClass="w-full"
      />
    </div>
  </form>
</div>
