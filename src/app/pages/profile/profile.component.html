<div class="page-wrap">
  <!-- Cabeçalho -->
  <div class="page-header">
    <div class="page-icon" style="background-color: var(--p-primary-100, #e0e7ff)">
      <i class="pi pi-user" style="font-size: 1.25rem; color: var(--p-primary-500, #6366f1)"></i>
    </div>
    <h1 class="page-title">Meu Perfil</h1>
  </div>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <span>Início</span>
    <span style="margin: 0 .25rem">›</span>
    <span>Perfil</span>
  </div>

  <!-- Linha 1: Dados pessoais + Alterar senha -->
  <div class="profile-grid">
    @if (profile()) {
      <app-personal-data-card
        [profile]="profile()!"
        (profileUpdated)="onProfileUpdated($event)"
      />
    } @else {
      <div class="loading-card">
        <i class="pi pi-spin pi-spinner" style="font-size: 2.5rem; color: #9ca3af"></i>
      </div>
    }
    <app-change-password-card />
  </div>

  <!-- Linha 2: Família -->
  <app-family-card />
</div>

<p-toast />
