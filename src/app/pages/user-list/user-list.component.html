<div class="p-4">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">Usuários</h1>
    <p-button label="Novo" icon="pi pi-plus" (onClick)="openCreate()" />
  </div>

  <p-table [value]="users()" [tableStyle]="{ 'min-width': '50rem' }" [stripedRows]="true">
    <ng-template #header>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>E-mail</th>
        <th>Criado em</th>
        <th>Ações</th>
      </tr>
    </ng-template>

    <ng-template #body let-user>
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.createdAt | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td>
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            severity="info"
            (onClick)="openEdit(user)"
            styleClass="mr-2"
          />
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            (onClick)="confirmDelete(user)"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template #empty>
      <tr>
        <td colspan="5" class="text-center p-4">Nenhum usuário encontrado.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<app-user-form
  [userId]="selectedUserId()"
  [visible]="formVisible()"
  (saved)="onFormSaved()"
  (cancelled)="onFormCancelled()"
/>

<p-toast />
<p-confirmDialog />
